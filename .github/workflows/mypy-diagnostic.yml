name: Mypy diagnostic

on:
  push:
    branches: [agent/deterministic-evaluation-cache]

permissions:
  contents: read

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - name: Run mypy with compact setup
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone --quiet --depth 1 --branch "$GITHUB_REF_NAME" \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          python -m pip install --quiet --disable-pip-version-check -e '.[dev]' >/dev/null 2>&1
          mypy
